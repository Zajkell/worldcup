function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function registerPush(playerName) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return false;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Save subscription to Supabase pool_data.pushSubscriptions
    await mergeAndSave(d => ({
      ...d,
      pushSubscriptions: {
        ...(d.pushSubscriptions || {}),
        [playerName]: JSON.stringify(sub)
      }
    }));
    return true;
  } catch(e) {
    console.error('Push registration failed', e);
    return false;
  }
}

async function unregisterPush(playerName) {
  try {
    const reg = await navigator.serviceWorker.getRegistration('/sw.js');
    if (reg) {
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sub.unsubscribe();
    }
    await mergeAndSave(d => {
      const subs = {...(d.pushSubscriptions || {})};
      delete subs[playerName];
      return {...d, pushSubscriptions: subs};
    });
  } catch(e) { console.error('Unregister failed', e); }
}

async function isPushEnabled(playerName) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
  if (Notification.permission !== 'granted') return false;
  try {
    const reg = await navigator.serviceWorker.getRegistration('/sw.js');
    if (!reg) return false;
    const sub = await reg.pushManager.getSubscription();
    return !!sub;
  } catch(e) { return false; }
}

function isLocked(kickoff){
  return new Date() >= new Date(new Date(kickoff).getTime() - 1000*60*15);
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'short'}) + " · " + d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
function calcPoints(bet, result){
  if(!bet || !result) return null;
  if(bet.home === result.home && bet.away === result.away) return 3;
  const b = bet.home > bet.away ? 'H' : bet.home < bet.away ? 'A' : 'D';
  const r = result.home > result.away ? 'H' : result.home < result.away ? 'A' : 'D';
  return b === r ? 1 : 0;
}
function specialDeadlinePassed(){ return new Date() >= SPECIAL_DEADLINE; }

function totalsForPlayer(p){
  const data = state.data;
  let pts=0, won=0, lost=0;
  FIXTURES.forEach(m=>{
    const result = data.results[m.id];
    if(!result) return;
    const bet = data.bets[p+"|"+m.id];
    if(!bet) return;
    const r = calcPoints(bet, result);
    if(r===3 || r===1) won++; else lost++;
    pts += r;
  });
  if(data.specialResult.topScorer && data.specialPicks[p]?.topScorer === data.specialResult.topScorer) pts+=5;
  if(data.specialResult.championTeam && data.specialPicks[p]?.championTeam === data.specialResult.championTeam) pts+=5;
  return {pts, won, lost};
}

// Returns the player's points earned on each of their last N played matches
// (matches with a result, in chronological order, that the player had a bet on).
function formForPlayer(p, n){
  const data = state.data;
  const played = FIXTURES
    .filter(m => data.results[m.id] && data.bets[p+"|"+m.id])
    .sort((a,b) => new Date(a.kickoff) - new Date(b.kickoff));
  const lastN = played.slice(-n);
  const pts = lastN.map(m => calcPoints(data.bets[p+"|"+m.id], data.results[m.id]));
  return { pts, total: pts.reduce((a,b)=>a+b, 0), matchesCount: lastN.length };
}

function formComment(name, total, matchesCount){
  if(matchesCount === 0) return "Jeszcze za wcześnie na ocenę formy";
  if(total >= 8) return `🔥 ${name} is on fire!`;
  if(total >= 4) return "Nie narzekaj, że jest ciężko, skoro idziesz na sam szczyt";
  if(total >= 1) return "🪵 Zmień dyscyplinę, chłopcze!";
  return "🧳 Chłopie, pakuj walizę";
}

// Computes FIFA-style card stats (1-99 scale) for a player based on their betting history.
function playerCardStats(p){
  const data = state.data;
  const played = FIXTURES.filter(m => data.results[m.id] && data.bets[p+"|"+m.id]);
  const playedCount = played.length;

  // CEL (celność): % of played matches where the player hit the exact score (3pts)
  let celRaw = 0;
  if(playedCount > 0){
    const exactHits = played.filter(m => calcPoints(data.bets[p+"|"+m.id], data.results[m.id]) === 3).length;
    celRaw = exactHits / playedCount; // 0..1
  }

  // FOR (forma): points from last 5 played matches, 0-15
  const form = formForPlayer(p, 5);
  const forRaw = form.matchesCount > 0 ? form.total / 15 : 0; // 0..1

  // SKU (skuteczność): % of played matches with at least 1pt
  let skuRaw = 0;
  if(playedCount > 0){
    const hits = played.filter(m => calcPoints(data.bets[p+"|"+m.id], data.results[m.id]) >= 1).length;
    skuRaw = hits / playedCount; // 0..1
  }

  // Activity bonus: more bets placed = higher base (0..1 based on % of played matches bet on)
  const totalPlayed = FIXTURES.filter(m => data.results[m.id]).length;
  const activityRaw = totalPlayed > 0 ? Math.min(1, playedCount / totalPlayed) : 0;

  return { celRaw, forRaw, skuRaw, activityRaw, playedCount };
}

// Scales a raw 0..1 value to the range [min, max]
function scaleRelative(raw, minVal, maxVal){
  return Math.round(minVal + raw * (maxVal - minVal));
}

// Normalizes an array of raw values [0..1] to [minOut, maxOut] relative to each other.
// If all values are equal, everyone gets (minOut+maxOut)/2.
function normalizeGroup(values, minOut, maxOut){
  const min = Math.min(...values);
  const max = Math.max(...values);
  if(max === min) return values.map(() => Math.round((minOut + maxOut) / 2));
  return values.map(v => Math.round(minOut + ((v - min) / (max - min)) * (maxOut - minOut)));
}

function renderFormRanking(){
  const N = 5;
  const playedMatchesCount = FIXTURES.filter(m => state.data.results[m.id]).length;
  if(playedMatchesCount < N){
    return `<div class="card">Ranking formy pojawi się po rozegraniu pierwszych ${N} meczów (obecnie: ${playedMatchesCount}).</div>`;
  }

  const rows = PLAYERS.map(p => {
    const form = formForPlayer(p, N);
    return { name: p, ...form };
  }).sort((a,b) => b.total - a.total);

  return `
  <div class="form-list">
    ${rows.map(r => `
      <div class="form-card">
        <div class="form-name">${r.name}</div>
        <div class="form-dots">
          ${r.pts.map(pts => `<span class="form-dot ${pts===3?'points-3':pts===1?'points-1':'points-0'}">${pts}</span>`).join('')}
          ${Array.from({length: Math.max(0, N - r.pts.length)}).map(()=>'<span class="form-dot form-dot-empty">—</span>').join('')}
        </div>
        <div class="form-total">${r.total} <span class="form-total-label">/ ${N*3} pkt</span></div>
        <div class="form-comment">${formComment(r.name, r.total, r.matchesCount)}</div>
      </div>`).join('')}
  </div>`;
}

function renderPlayerCards(){
  // Step 1: get raw stats for all players
  const rawStats = PLAYERS.map(p => ({ name: p, ...playerCardStats(p) }));

  // Step 2: normalize each stat relatively across all players
  const celNorm = normalizeGroup(rawStats.map(r => r.celRaw), 48, 94);
  const forNorm = normalizeGroup(rawStats.map(r => r.forRaw), 48, 94);
  const skuNorm = normalizeGroup(rawStats.map(r => r.skuRaw), 48, 94);

  // Step 3: compute OVR and tier for each player
  const rows = rawStats.map((r, i) => {
    const cel = celNorm[i];
    const forStat = forNorm[i];
    const sku = skuNorm[i];

    // Activity bonus: +0 to +8 depending on how many matches they've bet on
    const actBonus = Math.round(r.activityRaw * 8);

    // OVR: weighted blend + activity bonus
    let ovr = Math.round(cel * 0.4 + forStat * 0.35 + sku * 0.25) + actBonus;
    ovr = Math.min(99, Math.max(48, ovr));

    // Tier: lower thresholds for faster progression
    let tier;
    if(ovr >= 83) tier = 'tots';
    else if(ovr >= 72) tier = 'gold';
    else if(ovr >= 61) tier = 'silver';
    else tier = 'bronze';

    // Position label based on dominant stat
    const maxStat = Math.max(cel, forStat, sku);
    let position;
    if(maxStat === sku && sku >= 68) position = 'SKU';
    else if(maxStat === cel && cel >= 68) position = 'WYR';
    else if(maxStat === forStat && forStat >= 68) position = 'FOR';
    else position = 'GRA';

    return { name: r.name, ovr, cel, for: forStat, sku, tier, position, playedCount: r.playedCount };
  }).sort((a,b) => b.ovr - a.ovr);

  return `
  <div class="fifa-grid">
    ${rows.map(r => `<div class="fut-card-wrap">${renderFutCard(r)}</div>`).join('')}
  </div>`;
}


/* ============== SUPABASE I/O ============== */
async function loadData(isBackgroundPoll){
  try{
    const { data: rows, error } = await sb.from('pool_data').select('data').eq('id', 1).single();
    if(error) throw error;
    if(rows && rows.data && Object.keys(rows.data).length > 0){
      state.data = { ...DEFAULT_DATA, ...rows.data,
        results: rows.data.results || {},
        bets: { ...PRESET_BETS, ...(rows.data.bets || {}) },
        specialPicks: rows.data.specialPicks || {},
        specialResult: rows.data.specialResult || {topScorer:null, championTeam:null},
        credentials: rows.data.credentials || {}
      };
    } else {
      state.data = DEFAULT_DATA;
      await saveData(state.data);
    }
    state.error = null;
  } catch(e){
    console.error(e);
    if(!state.data) state.data = DEFAULT_DATA;
    state.error = "Nie udało się połączyć z bazą danych. Sprawdź połączenie.";
  } finally {
    state.loading = false;
    // While on the login screen, background polls have nothing useful to update
    // and risk disrupting the form — skip re-render entirely in that case.
    if(!(isBackgroundPoll && !state.user)){
      // Preserve the currently focused input's value/selection across re-render,
      // so background polling doesn't disrupt in-progress typing.
      const active = document.activeElement;
      let focusInfo = null;
      if(active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA') && active.id){
        focusInfo = { id: active.id, value: active.value, selStart: null, selEnd: null };
        try{
          if(active.tagName !== 'SELECT' && typeof active.selectionStart === 'number'){
            focusInfo.selStart = active.selectionStart;
            focusInfo.selEnd = active.selectionEnd;
          }
        }catch(e){ /* some input types (e.g. password in some browsers) don't support selection */ }
      }
      render();
      if(focusInfo){
        const el = document.getElementById(focusInfo.id);
        if(el){
          el.value = focusInfo.value;
          el.focus();
          if(focusInfo.selStart !== null && el.setSelectionRange){
            try{ el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); }catch(e){}
          }
        }
      }
    }
  }
}

function addActivity(data, message){
  const entry = { message, timestamp: new Date().toISOString() };
  const log = [entry, ...(data.activityLog || [])].slice(0, 100);
  return { ...data, activityLog: log };
}

// Called after a successful login. Computes a recap of points earned on
// matches finished since the player's last visit, shows it as a popup,
// and updates their lastSeen timestamp.
async function handleSuccessfulLogin(name){
  const isAdmin = name === ADMIN;
  const lastSeenIso = state.data.lastSeen?.[name] || null;
  const now = new Date().toISOString();

  let recap = [];
  if(!isAdmin){
    const lastSeenDate = lastSeenIso ? new Date(lastSeenIso) : null;
    FIXTURES.forEach(m=>{
      const result = state.data.results[m.id];
      if(!result) return;
      // Only matches that finished after the player's last visit
      const kickoff = new Date(m.kickoff);
      if(lastSeenDate && kickoff <= lastSeenDate) return;
      const bet = state.data.bets[name+"|"+m.id];
      if(!bet) return;
      const pts = calcPoints(bet, result);
      if(pts > 0){
        recap.push({
          match: `${m.home} - ${m.away}`,
          result: `${result.home}:${result.away}`,
          bet: `${bet.home}:${bet.away}`,
          pts
        });
      }
    });
  }

  state.user = { name, isAdmin };
  state.view = 'home';
  state.loginRecap = (recap.length > 0) ? recap : null;

  // Update lastSeen (fire-and-forget merge save, doesn't block UI)
  await mergeAndSave(d => ({ ...d, lastSeen: { ...d.lastSeen, [name]: now } }));
}


// Fetches the freshest data, applies a mutation function, then writes back.
// Reduces (but does not fully eliminate) overwrite collisions between concurrent users.
async function mergeAndSave(mutate, successMsg){
  try{
    const { data: rows, error } = await sb.from('pool_data').select('data').eq('id', 1).single();
    if(error) throw error;
    const fresh = rows && rows.data ? rows.data : {};
    const normalized = {
      ...DEFAULT_DATA, ...fresh,
      results: fresh.results || {},
      bets: { ...PRESET_BETS, ...(fresh.bets || {}) },
      specialPicks: fresh.specialPicks || {},
      specialResult: fresh.specialResult || {topScorer:null, championTeam:null},
      credentials: fresh.credentials || {},
      activityLog: fresh.activityLog || [],
      lastSeen: fresh.lastSeen || {}
    };
    const updated = mutate(normalized);
    const { error: writeErr } = await sb.from('pool_data').update({ data: updated }).eq('id', 1);
    if(writeErr) throw writeErr;
    state.data = updated;
    state.error = null;
    if(successMsg){
      state.successMessage = successMsg;
      setTimeout(()=>{ state.successMessage = null; render(); }, 2500);
    }
  } catch(e){
    console.error(e);
    state.error = "Nie udało się zapisać zmian. Spróbuj ponownie.";
  }
  render();
}

async function saveData(newData){
  state.data = newData;
  try{
    const { error } = await sb.from('pool_data').update({ data: newData }).eq('id', 1);
    if(error) throw error;
    state.error = null;
  } catch(e){
    console.error(e);
    state.error = "Nie udało się zapisać zmian. Spróbuj ponownie.";
  }
  render();
}

// Registers a new account password safely: fetches the freshest credentials
// right before writing, to avoid overwriting other players' just-saved passwords.
async function registerCredential(name, pass){
  try{
    const { data: rows, error } = await sb.from('pool_data').select('data').eq('id', 1).single();
    if(error) throw error;
    const fresh = rows && rows.data ? rows.data : {};
    const freshCreds = fresh.credentials || {};
    if(freshCreds[name]){
      // Someone already registered this account in the meantime
      return { ok:false, existing: freshCreds[name] };
    }
    const mergedData = {
      ...DEFAULT_DATA, ...fresh,
      results: fresh.results || {},
      bets: { ...PRESET_BETS, ...(fresh.bets || {}) },
      specialPicks: fresh.specialPicks || {},
      specialResult: fresh.specialResult || {topScorer:null, championTeam:null},
      credentials: { ...freshCreds, [name]: pass },
      activityLog: fresh.activityLog || [],
      lastSeen: fresh.lastSeen || {}
    };
    const { error: writeErr } = await sb.from('pool_data').update({ data: mergedData }).eq('id', 1);
    if(writeErr) throw writeErr;
    state.data = mergedData;
    state.error = null;
    return { ok:true };
  } catch(e){
    console.error(e);
    state.error = "Nie udało się zapisać hasła. Spróbuj ponownie.";
    return { ok:false, error:true };
  }
}

function render(){

  if(state.loading){

  }
  if(!state.user){
    app.innerHTML = renderNav() + renderLogin();
  } else if(state.view === "matches"){
    app.innerHTML = renderNav() + renderMatches();
  } else if(state.view === "leaderboard"){

  } else if(state.view === "special"){

  } else if(state.view === "activity"){

  } else if(state.view === "admin"){
    app.innerHTML = renderNav() + renderAdmin();

  if(state.loginRecap){

// In-memory cache so we don't re-fetch Wikipedia images on every re-render
const scorerPhotoCache = {};

async function loadScorerPhotos(){
  const list = state.data.topScorersLive || [];
  list.forEach((s, i) => {
    const container = document.getElementById('scorer-photo-' + i);
    if(!container) return;
    const name = s.name;
    if(scorerPhotoCache[name] === undefined){
      fetchWikipediaThumbnail(name).then(url => {
        scorerPhotoCache[name] = url;
        const el = document.getElementById('scorer-photo-' + i);
        if(el && url){
          el.innerHTML = `<img src="${url}" alt="${name}" loading="lazy">`;
        }
      });
    } else if(scorerPhotoCache[name]){
      container.innerHTML = `<img src="${scorerPhotoCache[name]}" alt="${name}" loading="lazy">`;
    }
  });
}

async function fetchWikipediaThumbnail(name){
  try{
    const query = encodeURIComponent(name + " footballer");
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${query}&format=json&origin=*&srlimit=1`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();
    const hit = searchData?.query?.search?.[0];
    if(!hit) return null;
    const pageTitle = encodeURIComponent(hit.title);
    const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${pageTitle}&prop=pageimages&format=json&pithumbsize=100&origin=*`;
    const imgRes = await fetch(imgUrl);
    const imgData = await imgRes.json();
    const pages = imgData?.query?.pages || {};
    const page = Object.values(pages)[0];
    return page?.thumbnail?.source || null;
  } catch(e){
    console.error("Wikipedia photo fetch failed for", name, e);
    return null;
  }
}

      <div class="deadline">Blokada w piątek 12.06.2026 · +5 pkt za trafienie</div>
      ${data.specialResult.topScorer ? `<div class="all-picks"><div class="pick-row"><span>Ustawiony zwycięzca:</span><span class="winner-set">${data.specialResult.topScorer}</span></div></div>` : ''}
      ${!state.user.isAdmin ? `
        ${locked ? `<div class="special-locked">🔒 Typy zablokowane</div>
          <div class="all-picks"><div class="pick-row"><span>Twój typ:</span><span><b>${myPick.topScorer || '— brak —'}</b></span></div></div>` : `
          <label>Twój typ na króla strzelców</label>
          <input type="text" id="pick-scorer" placeholder="Imię i nazwisko zawodnika" value="${myPick.topScorer || ''}">
          <button class="save-bet" data-save-special="topScorer" style="width:100%; margin-top:6px;">Zapisz typ</button>
        `}
      ` : `
        <div class="all-picks">
          ${PLAYERS.map(p=>`<div class="pick-row"><span>${p}</span><span>${data.specialPicks[p]?.topScorer || '—'}</span></div>`).join('')}
        </div>
      `}
    </div>`;

  const championCard = `
    <div class="special-card">
      <h3>🏆 Zwycięzca turnieju</h3>
      <div class="deadline">Blokada w piątek 12.06.2026 · +5 pkt za trafienie</div>
      ${data.specialResult.championTeam ? `<div class="all-picks"><div class="pick-row"><span>Ustawiony zwycięzca:</span><span class="winner-set">${data.specialResult.championTeam}</span></div></div>` : ''}
      ${!state.user.isAdmin ? `
        ${locked ? `<div class="special-locked">🔒 Typy zablokowane</div>
          <div class="all-picks"><div class="pick-row"><span>Twój typ:</span><span><b>${myPick.championTeam || '— brak —'}</b></span></div></div>` : `
          <label>Twój typ na zwycięzcę mundialu</label>
          <input type="text" id="pick-champion" placeholder="Nazwa reprezentacji" value="${myPick.championTeam || ''}">
          <button class="save-bet" data-save-special="championTeam" style="width:100%; margin-top:6px;">Zapisz typ</button>
        `}
      ` : `
        <div class="all-picks">
          ${PLAYERS.map(p=>`<div class="pick-row"><span>${p}</span><span>${data.specialPicks[p]?.championTeam || '—'}</span></div>`).join('')}
        </div>
      `}
    </div>`;

  return `
  <main>
    ${errBanner()}${successBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Zakłady <span class="gold">specjalne</span></h2>
        <div class="section-sub">${locked ? 'Zablokowane' : 'Otwarte do piątku 12.06.2026, 23:59'}</div>
      </div>
      <div class="special-grid">
        ${scorerCard}
        ${championCard}
      </div>
    </div>
  </main>`;
}

function renderActivity(){
  const log = state.data.activityLog || [];
  return `
  <main>
    ${errBanner()}${successBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Aktywność <span class="gold">na żywo</span></h2>
        <div class="section-sub">Historia zakładów, wyników i typów (ostatnie 100 zdarzeń)</div>
      </div>
      ${log.length === 0 ? '<div class="card">Brak aktywności — pierwsze zakłady i wyniki pojawią się tutaj.</div>' : `
      <div class="activity-feed">
        ${log.map(entry => `
          <div class="activity-item">
            <div class="activity-message">${entry.message}</div>
            <div class="activity-time">${fmtDateTime(entry.timestamp)}</div>
          </div>`).join('')}
      </div>`}
    </div>
  </main>`;
}

function fmtDateTime(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}) + " " + d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}

function renderAdmin(){
  const data = state.data;
  return `
  <main>
    ${errBanner()}${successBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Panel <span class="gold">admina</span></h2>
        <div class="section-sub">Wpisuj wyniki i ustal zwycięzców zakładów specjalnych — tryb obserwatora, bez obstawiania</div>
      </div>
      <div class="admin-grid">
        <div class="card">
          <h2>Król strzelców — ostateczna odpowiedź</h2>
          <div class="sub">Wpisz rzeczywistego króla strzelców po zakończeniu turnieju</div>
          <input type="text" id="admin-scorer" placeholder="Imię i nazwisko zawodnika" value="${data.specialResult.topScorer || ''}">
          <button class="save-bet" id="set-scorer" style="width:100%;">Ustaw króla strzelców</button>
        </div>
        <div class="card">
          <h2>Zwycięzca turnieju — ostateczna odpowiedź</h2>
          <div class="sub">Wpisz rzeczywistego mistrza świata</div>
          <input type="text" id="admin-champion" placeholder="Nazwa reprezentacji" value="${data.specialResult.championTeam || ''}">
          <button class="save-bet" id="set-champion" style="width:100%;">Ustaw zwycięzcę</button>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <h2>Wyniki <span class="gold">meczów</span></h2>
        <div class="section-sub">Wpisz wynik, aby automatycznie naliczyć punkty</div>
      </div>
      ${FIXTURES.map(renderMatchCard).join('')}
    </div>
  </main>`;
}

/* ============== OBSŁUGA ZDARZEŃ ============== */
function attachHandlers(){
  document.querySelectorAll('[data-quick]').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.getElementById('login-name').value = b.dataset.quick;
      document.getElementById('login-pass').value = '';
      document.getElementById('login-pass').focus();
    });
  });

  const loginBtn = document.getElementById('login-btn');
  if(loginBtn) loginBtn.addEventListener('click', async ()=>{
    const name = document.getElementById('login-name').value;
    const pass = document.getElementById('login-pass').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    if(!pass){
      err.textContent = 'Wpisz hasło.';
      err.style.display = 'block';
      return;
    }
    const creds = state.data.credentials || {};
    if(!creds[name]){
      const result = await registerCredential(name, pass);
      if(result.ok){
        await handleSuccessfulLogin(name);
      } else if(result.existing){
        // Someone else registered this account moments ago — check against that
        if(result.existing === pass){
          await handleSuccessfulLogin(name);
        } else {
          err.textContent = 'To konto zostało już zarejestrowane z innym hasłem. Spróbuj ponownie.';
          err.style.display = 'block';
          render();
        }
      } else {
        render();
      }
    } else if(creds[name] !== pass){
      err.textContent = 'Nieprawidłowe hasło.';
      err.style.display = 'block';
    } else {
      await handleSuccessfulLogin(name);
    }
  });

  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const v = b.dataset.nav;
      if(v === 'logout'){ state.user = null; state.view='home'; render(); return; }
      if(v === 'refresh'){ loadData(); return; }
      if(v === 'push-toggle'){
        const btn = document.getElementById('push-toggle-btn');
        const enabled = await isPushEnabled(state.user.name);
        if(enabled){
          await unregisterPush(state.user.name);
          if(btn){ btn.textContent = '🔔 Powiadomienia'; btn.style.color = ''; }
          state.successMessage = 'Powiadomienia wyłączone';
          setTimeout(()=>{ state.successMessage = null; render(); }, 2500);
          render();
        } else {
          const ok = await registerPush(state.user.name);
          if(ok){
            if(btn){ btn.textContent = '🔕 Wył. powiadomienia'; btn.style.color = 'var(--gold)'; }
            state.successMessage = '🔔 Powiadomienia włączone! Dostaniesz alert 15 min przed meczem.';
            setTimeout(()=>{ state.successMessage = null; render(); }, 3500);
          } else {
            state.error = 'Nie udało się włączyć powiadomień. Sprawdź czy przeglądarka zezwala na powiadomienia.';
          }
          render();
        }
        return;
      }
      state.view = v;
      render();
    });
  });

  document.querySelectorAll('[data-save-bet]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const id = b.dataset.saveBet;
      const h = document.getElementById('bet-home-'+id).value;
      const a = document.getElementById('bet-away-'+id).value;
      if(h==='' || a==='') return;
      const fixture = FIXTURES.find(m=>m.id===id);
      const matchLabel = fixture ? `${fixture.home} - ${fixture.away}` : id;
      await mergeAndSave(d => {
        const next = {...d, bets: {...d.bets, [state.user.name+"|"+id]: {home:parseInt(h), away:parseInt(a)}}};
        return addActivity(next, `${state.user.name} obstawił ${h}:${a} na ${matchLabel}`);
      }, "Zakład zapisany ✓");
    });
  });

  document.querySelectorAll('[data-save-result]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const id = b.dataset.saveResult;
      const h = document.getElementById('res-home-'+id).value;
      const a = document.getElementById('res-away-'+id).value;
      if(h==='' || a==='') return;
      const fixture = FIXTURES.find(m=>m.id===id);
      const matchLabel = fixture ? `${fixture.home} - ${fixture.away}` : id;
      const result = {home:parseInt(h), away:parseInt(a)};
      await mergeAndSave(d => {
        let next = {...d, results: {...d.results, [id]: result}};
        next = addActivity(next, `Admin wpisał wynik: ${matchLabel} ${h}:${a}`);
        // Log points earned by each player for this match
        PLAYERS.forEach(p=>{
          const bet = next.bets[p+"|"+id];
          if(!bet) return;
          const pts = calcPoints(bet, result);
          if(pts === 3){
            next = addActivity(next, `${p} zdobył 3 pkt za dokładny wynik meczu ${matchLabel}`);
          } else if(pts === 1){
            next = addActivity(next, `${p} zdobył 1 pkt za trafiony wynik meczu ${matchLabel}`);
          }
        });
        return next;
      }, "Wynik zapisany ✓");
    });
  });

  document.querySelectorAll('[data-save-special]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const key = b.dataset.saveSpecial;
      const val = key==='topScorer' ? document.getElementById('pick-scorer').value.trim() : document.getElementById('pick-champion').value.trim();
      if(!val) return;
      const label = key==='topScorer' ? 'Króla Strzelców' : 'Zwycięzcę Mundialu';
      await mergeAndSave(d => {
        const next = {...d, specialPicks: {...d.specialPicks, [state.user.name]: {...(d.specialPicks[state.user.name]||{}), [key]: val}}};
        return addActivity(next, `${state.user.name} wybrał typ na ${label}: ${val}`);
      }, "Typ zapisany ✓");
    });
  });

  const setScorer = document.getElementById('set-scorer');
  if(setScorer) setScorer.addEventListener('click', async ()=>{
    const val = document.getElementById('admin-scorer').value.trim();
    await mergeAndSave(d => {
      let next = {...d, specialResult: {...d.specialResult, topScorer: val || null}};
      if(val){
        next = addActivity(next, `Admin ustawił Króla Strzelców: ${val}`);
        PLAYERS.forEach(p=>{
          if(next.specialPicks[p]?.topScorer === val){
            next = addActivity(next, `${p} zdobył 5 pkt za trafienie Króla Strzelców (${val})`);
          }
        });
      }
      return next;
    }, "Zapisano ✓");
  });
  const setChampion = document.getElementById('set-champion');
  if(setChampion) setChampion.addEventListener('click', async ()=>{
    const val = document.getElementById('admin-champion').value.trim();
    await mergeAndSave(d => {
      let next = {...d, specialResult: {...d.specialResult, championTeam: val || null}};
      if(val){
        next = addActivity(next, `Admin ustawił Zwycięzcę Mundialu: ${val}`);
        PLAYERS.forEach(p=>{
          if(next.specialPicks[p]?.championTeam === val){
            next = addActivity(next, `${p} zdobył 5 pkt za trafienie Zwycięzcy Mundialu (${val})`);
          }
        });
      }
      return next;
    }, "Zapisano ✓");
  });
}

/* ============== INICJALIZACJA + AKTUALIZACJE NA ŻYWO ============== */
loadData();
setInterval(()=>loadData(true), 8000);
</script>
