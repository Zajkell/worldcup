<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Pula zakładów</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg-deep:#0a1410;
    --bg-card:#142922;
    --bg-panel:#101f1a;
    --line:#26392f;
    --gold:#f5c542;
    --gold-soft:#e0b13a;
    --green-bright:#2ea861;
    --text:#eef3ee;
    --text-dim:#9fb3a8;
    --red:#d9534f;
    --font-display:'Anton','Arial Narrow',sans-serif;
    --font-body:'Inter',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--font-body);
    background:radial-gradient(ellipse at top,#14231d 0%,var(--bg-deep) 55%,#060c09 100%);
    color:var(--text); min-height:100vh; line-height:1.5;
  }
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  nav{position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
    padding:18px 40px; background:rgba(10,20,16,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  .logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); letter-spacing:1px; font-size:1.3rem;}
  .logo .accent{color:var(--gold);}
  .nav-links{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .nav-btn{padding:9px 18px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--text);
    font-weight:600; font-size:0.85rem; cursor:pointer; transition:.2s; font-family:var(--font-body);}
  .nav-btn:hover{border-color:var(--gold-soft); color:var(--gold);}
  .nav-btn.active{background:var(--gold); color:#1a1405; border-color:var(--gold);}
  .user-chip{font-size:0.8rem; color:var(--text-dim); padding:8px 14px; border:1px solid var(--line); border-radius:999px;}

  main{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:0 24px 80px;}
  .hero{text-align:center; padding:90px 20px 60px;}
  .badge{display:inline-flex; align-items:center; gap:8px; border:1px solid var(--gold-soft); color:var(--gold);
    padding:7px 18px; border-radius:999px; font-size:0.8rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    margin-bottom:28px; background:rgba(245,197,66,0.06);}
  .hero h1{font-family:var(--font-display); font-size:clamp(2.6rem,7vw,5.2rem); line-height:1.05; letter-spacing:1px; text-transform:uppercase;}
  .hero h1 .gold-line{color:var(--gold); display:block;}
  .hero p{max-width:640px; margin:28px auto 0; color:var(--text-dim); font-size:1.05rem;}

  .section{margin-top:64px;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;}
  .section-head h2{font-family:var(--font-display); font-size:1.8rem; letter-spacing:1px; text-transform:uppercase;}
  .section-head .gold{color:var(--gold);}
  .section-sub{color:var(--text-dim); font-size:0.85rem;}

  .login-wrap{max-width:420px; margin:80px auto;}
  .card{background:var(--bg-card); border:1px solid var(--line); border-radius:18px; padding:32px;}
  .card h2{font-family:var(--font-display); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; font-size:1.6rem;}
  .card .sub{color:var(--text-dim); font-size:0.85rem; margin-bottom:24px;}
  label{display:block; font-size:0.78rem; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; font-weight:700;}
  input, select{width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg-panel); color:var(--text); font-size:0.95rem; margin-bottom:16px; font-family:var(--font-body);}
  input:focus, select:focus{outline:none; border-color:var(--gold-soft);}
  .error-msg{color:var(--red); font-size:0.85rem; margin-bottom:12px;}
  .quick-users{margin-top:18px; display:flex; flex-wrap:wrap; gap:6px;}
  .quick-users button{font-size:0.72rem; padding:5px 10px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg-panel); color:var(--text-dim); cursor:pointer; font-family:var(--font-body);}
  .quick-users button:hover{border-color:var(--gold-soft); color:var(--gold);}

  .btn-primary{background:var(--gold); color:#1a1405; border:none; font-weight:800; padding:14px 28px;
    border-radius:999px; font-size:0.9rem; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px;
    transition:.2s; font-family:var(--font-body); width:100%;}
  .btn-primary:hover{background:var(--gold-soft);}

  .match-card{background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:18px 22px;
    margin-bottom:12px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
  .match-meta{font-size:0.72rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; min-width:150px;}
  .match-meta .group{color:var(--gold); font-weight:700;}
  .match-teams{display:flex; align-items:center; gap:14px; flex:1; min-width:220px; font-weight:700; font-size:1.05rem; justify-content:center;}
  .match-teams .vs{color:var(--text-dim); font-weight:400; font-size:0.85rem;}
  .score-input-group{display:flex; align-items:center; gap:8px;}
  .score-box{width:48px; padding:10px 0; text-align:center; border-radius:8px; border:1px solid var(--line);
    background:var(--bg-panel); color:var(--text); font-size:1.1rem; font-weight:800; margin:0; font-family:var(--font-mono);}
  .score-box:disabled{opacity:0.4;}
  .dash{color:var(--text-dim); font-weight:800;}
  .save-bet{padding:9px 16px; border-radius:8px; border:none; background:var(--green-bright); color:#06140c;
    font-weight:800; cursor:pointer; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.5px; font-family:var(--font-body);}
  .lock-tag{font-size:0.68rem; padding:4px 10px; border-radius:999px; border:1px solid var(--red); color:var(--red);
    text-transform:uppercase; letter-spacing:1px; font-weight:700;}
  .result-tag{font-family:var(--font-mono); font-weight:800; font-size:1.3rem; color:var(--gold); min-width:80px; text-align:center;}
  .points-tag{font-size:0.68rem; padding:4px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:1px; font-weight:800;}
  .points-3{background:rgba(46,168,97,0.18); color:var(--green-bright); border:1px solid var(--green-bright);}
  .points-1{background:rgba(245,197,66,0.15); color:var(--gold); border:1px solid var(--gold-soft);}
  .points-0{background:rgba(217,83,79,0.1); color:var(--red); border:1px solid rgba(217,83,79,0.4);}
  .admin-result-edit{display:flex; align-items:center; gap:6px;}
  .admin-result-edit input{width:44px; margin:0; padding:8px 0; text-align:center;}

  .leader-table{width:100%; border-collapse:collapse; background:var(--bg-card); border-radius:14px; overflow:hidden; border:1px solid var(--line);}
  .leader-table th, .leader-table td{padding:14px 18px; text-align:left; font-size:0.9rem;}
  .leader-table th{background:var(--bg-panel); color:var(--text-dim); text-transform:uppercase; font-size:0.7rem; letter-spacing:1.5px;}
  .leader-table tr:not(:last-child) td{border-bottom:1px solid var(--line);}
  .rank-cell{font-family:var(--font-display); font-size:1.2rem; color:var(--gold); width:50px;}
  .pts-cell{font-family:var(--font-mono); font-weight:800; font-size:1.05rem;}

  .chart-card{background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:24px;}
  .bar-row{display:flex; align-items:center; gap:14px; margin-bottom:14px;}
  .bar-name{width:90px; font-size:0.85rem; font-weight:700; flex-shrink:0;}
  .bar-track{flex:1; background:var(--bg-panel); border-radius:8px; height:26px; overflow:hidden; position:relative;}
  .bar-fill{height:100%; background:linear-gradient(90deg,var(--green-bright) 0%,var(--gold) 100%); border-radius:8px;
    transition:width .6s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:8px;}
  .bar-fill span{font-family:var(--font-mono); font-size:0.78rem; font-weight:800; color:#06140c;}

  .special-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  @media(max-width:760px){.special-grid{grid-template-columns:1fr;} .admin-grid{grid-template-columns:1fr !important;}}
  .special-card{background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:24px;}
  .special-card h3{font-family:var(--font-display); letter-spacing:1px; text-transform:uppercase; font-size:1.2rem; margin-bottom:4px;}
  .special-card .deadline{font-size:0.75rem; color:var(--gold); margin-bottom:16px; text-transform:uppercase; letter-spacing:1px;}
  .special-locked{font-size:0.85rem; color:var(--red); margin-top:10px; font-weight:700;}
  .all-picks{margin-top:14px; font-size:0.8rem; color:var(--text-dim);}
  .all-picks .pick-row{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line);}
  .all-picks .pick-row:last-child{border-bottom:none;}
  .winner-set{color:var(--green-bright); font-weight:700;}
  .admin-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .stats-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:56px;}
  .stat-card{background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:22px 14px; text-align:center;}
  .stat-card .num{font-family:var(--font-display); font-size:1.9rem;}
  .stat-card .lbl{font-size:0.7rem; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-top:4px;}
  .stat-card .icon{font-size:1.4rem; margin-bottom:8px; color:var(--gold);}
  .loading{text-align:center; padding:80px 20px; color:var(--text-dim);}
  .err-banner{background:rgba(217,83,79,0.1); border:1px solid var(--red); color:var(--red); padding:12px 18px; border-radius:10px; margin-bottom:18px; font-size:0.85rem;}
</style>
</head>
<body>
<div id="app"><div class="loading">Ładowanie puli...</div></div>

<script>
/* ============== KONFIGURACJA SUPABASE ============== */
const SUPABASE_URL = "https://hxkyippocsbfwurfhosf.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_I0k6muP4QpIPKStOukfAWA_-wyPocWr";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============== DANE STAŁE ============== */
const PLAYERS = ["Kachel","Ssaku","Włodi","Gercu","Shakur","Pędzel","Bonsu","Kaczor","Rejbik"];
const ADMIN = "Admin";
const SPECIAL_DEADLINE = new Date("2026-06-12T23:59:59Z");

const FIXTURES = [
  {id:"m1", group:"Grupa A", home:"Mexico", away:"South Africa", kickoff:"2026-06-11T19:00:00Z"},
  {id:"m2", group:"Grupa A", home:"South Korea", away:"Czechia", kickoff:"2026-06-12T02:00:00Z"},
  {id:"m3", group:"Grupa B", home:"Canada", away:"Bosnia and Herzegovina", kickoff:"2026-06-12T19:00:00Z"},
  {id:"m4", group:"Grupa B", home:"Qatar", away:"Switzerland", kickoff:"2026-06-13T19:00:00Z"},
  {id:"m5", group:"Grupa D", home:"USA", away:"Paraguay", kickoff:"2026-06-13T01:00:00Z"},
  {id:"m6", group:"Grupa D", home:"Australia", away:"Türkiye", kickoff:"2026-06-13T05:00:00Z"},
  {id:"m7", group:"Grupa C", home:"Brazil", away:"Morocco", kickoff:"2026-06-13T22:00:00Z"},
  {id:"m8", group:"Grupa C", home:"Haiti", away:"Scotland", kickoff:"2026-06-14T01:00:00Z"},
  {id:"m9", group:"Grupa I", home:"France", away:"Senegal", kickoff:"2026-06-16T19:00:00Z"},
  {id:"m10", group:"Grupa L", home:"England", away:"Croatia", kickoff:"2026-06-17T20:00:00Z"},
  {id:"m11", group:"Grupa H", home:"Spain", away:"Cape Verde", kickoff:"2026-06-15T17:00:00Z"},
  {id:"m12", group:"Grupa J", home:"Argentina", away:"Algeria", kickoff:"2026-06-16T21:00:00Z"},
  {id:"m13", group:"Grupa A", home:"Czechia", away:"South Africa", kickoff:"2026-06-18T17:00:00Z"},
  {id:"m14", group:"Grupa A", home:"Mexico", away:"South Korea", kickoff:"2026-06-19T02:00:00Z"},
  {id:"m15", group:"Grupa B", home:"Switzerland", away:"Bosnia and Herzegovina", kickoff:"2026-06-18T20:00:00Z"},
  {id:"m16", group:"Grupa B", home:"Canada", away:"Qatar", kickoff:"2026-06-18T23:00:00Z"}
];

const PRESET_BETS = {
  "Ssaku|m1": {home:3, away:0},
  "Włodi|m1": {home:2, away:1},
  "Gercu|m1": {home:2, away:0},
  "Shakur|m1": {home:3, away:0},
  "Kachel|m1": {home:4, away:2},
  "Pędzel|m1": {home:2, away:1},
  "Bonsu|m1": {home:1, away:1},
  "Kaczor|m1": {home:3, away:1},
  "Rejbik|m1": {home:2, away:1}
};

const DEFAULT_DATA = {
  results: {},
  bets: PRESET_BETS,
  specialPicks: {},
  specialResult: { topScorer: null, championTeam: null },
  credentials: {}
};

/* ============== STAN ============== */
let state = {
  user: null,
  view: "home",
  data: null,
  loading: true,
  error: null
};

/* ============== POMOCNICZE ============== */
function isLocked(kickoff){
  return new Date() >= new Date(new Date(kickoff).getTime() - 1000*60*60);
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'short'}) + " · " + d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
function calcPoints(bet, result){
  if(!bet || !result) return null;
  if(bet.home === result.home && bet.away === result.away) return 3;
  const b = bet.home > bet.away ? 'H' : bet.home < bet.away ? 'A' : 'D';
  const r = result.home > result.away ? 'H' : result.home < result.away ? 'A' : 'D';
  return b === r ? 1 : 0;
}
function specialDeadlinePassed(){ return new Date() >= SPECIAL_DEADLINE; }

function totalsForPlayer(p){
  const data = state.data;
  let pts=0, won=0, lost=0;
  FIXTURES.forEach(m=>{
    const result = data.results[m.id];
    if(!result) return;
    const bet = data.bets[p+"|"+m.id];
    if(!bet) return;
    const r = calcPoints(bet, result);
    if(r===3 || r===1) won++; else lost++;
    pts += r;
  });
  if(data.specialResult.topScorer && data.specialPicks[p]?.topScorer === data.specialResult.topScorer) pts+=5;
  if(data.specialResult.championTeam && data.specialPicks[p]?.championTeam === data.specialResult.championTeam) pts+=5;
  return {pts, won, lost};
}

/* ============== SUPABASE I/O ============== */
async function loadData(){
  try{
    const { data: rows, error } = await sb.from('pool_data').select('data').eq('id', 1).single();
    if(error) throw error;
    if(rows && rows.data && Object.keys(rows.data).length > 0){
      state.data = { ...DEFAULT_DATA, ...rows.data,
        results: rows.data.results || {},
        bets: { ...PRESET_BETS, ...(rows.data.bets || {}) },
        specialPicks: rows.data.specialPicks || {},
        specialResult: rows.data.specialResult || {topScorer:null, championTeam:null},
        credentials: rows.data.credentials || {}
      };
    } else {
      state.data = DEFAULT_DATA;
      await saveData(state.data);
    }
    state.error = null;
  } catch(e){
    console.error(e);
    if(!state.data) state.data = DEFAULT_DATA;
    state.error = "Nie udało się połączyć z bazą danych. Sprawdź połączenie.";
  } finally {
    state.loading = false;
    render();
  }
}

async function saveData(newData){
  state.data = newData;
  try{
    const { error } = await sb.from('pool_data').update({ data: newData }).eq('id', 1);
    if(error) throw error;
    state.error = null;
  } catch(e){
    console.error(e);
    state.error = "Nie udało się zapisać zmian. Spróbuj ponownie.";
  }
  render();
}

/* ============== RENDEROWANIE ============== */
function render(){
  const app = document.getElementById('app');
  if(state.loading){
    app.innerHTML = '<div class="loading">Ładowanie puli...</div>';
    return;
  }
  if(!state.user){
    app.innerHTML = renderNav() + renderLogin();
  } else if(state.view === "matches"){
    app.innerHTML = renderNav() + renderMatches();
  } else if(state.view === "leaderboard"){
    app.innerHTML = renderNav() + renderLeaderboard();
  } else if(state.view === "special"){
    app.innerHTML = renderNav() + renderSpecial();
  } else if(state.view === "admin"){
    app.innerHTML = renderNav() + renderAdmin();
  } else {
    app.innerHTML = renderNav() + renderHome();
  }
  attachHandlers();
}

function errBanner(){
  return state.error ? `<div class="err-banner">${state.error}</div>` : '';
}

function renderNav(){
  if(!state.user){
    return `<nav><div class="logo">⚽ WORLD CUP <span class="accent">2026</span></div><div class="nav-links"></div></nav>`;
  }
  const v = state.view;
  return `
  <nav>
    <div class="logo">⚽ WORLD CUP <span class="accent">2026</span></div>
    <div class="nav-links">
      <button class="nav-btn ${v==='home'?'active':''}" data-nav="home">Start</button>
      <button class="nav-btn ${v==='matches'?'active':''}" data-nav="matches">Mecze</button>
      <button class="nav-btn ${v==='leaderboard'?'active':''}" data-nav="leaderboard">Tabela</button>
      <button class="nav-btn ${v==='special'?'active':''}" data-nav="special">Zakłady specjalne</button>
      ${state.user.isAdmin ? `<button class="nav-btn ${v==='admin'?'active':''}" data-nav="admin">Admin</button>` : ''}
      <span class="user-chip">${state.user.isAdmin ? '👁 Obserwator · ' : '👤 '}${state.user.name}</span>
      <button class="nav-btn" data-nav="logout">Wyloguj</button>
    </div>
  </nav>`;
}

function renderLogin(){
  return `
  <main>
    ${errBanner()}
    <div class="hero">
      <div class="badge">🏆 World Cup 2026</div>
      <h1>Przewiduj. Rywalizuj.<span class="gold-line">Zdobądź chwałę.</span></h1>
      <p>Wspólna pula zakładów na Mistrzostwa Świata 2026. 9 graczy, każdy mecz, jeden mistrz. Obstawiaj wyniki, śledź tabelę i pokaż, że znasz się na piłce najlepiej.</p>
    </div>
    <div class="login-wrap">
      <div class="card">
        <h2>Wejdź do puli</h2>
        <div class="sub">Zaloguj się swoim imieniem i hasłem.</div>
        <div id="login-error" class="error-msg" style="display:none;"></div>
        <label>Imię</label>
        <select id="login-name">
          ${PLAYERS.map(p=>`<option value="${p}">${p}</option>`).join('')}
          <option value="${ADMIN}">Admin (obserwator)</option>
        </select>
        <label>Hasło</label>
        <input id="login-pass" type="password" placeholder="Wpisz hasło">
        <button class="btn-primary" id="login-btn">Wejdź do puli 🏆</button>
        <div class="quick-users">
          ${PLAYERS.map(p=>`<button data-quick="${p}">${p}</button>`).join('')}
          <button data-quick="${ADMIN}">Admin</button>
        </div>
        <div style="margin-top:14px; font-size:0.72rem; color:var(--text-dim);">Pierwsze logowanie? Wpisz dowolne hasło — zostanie ono zapisane jako hasło do Twojego konta.</div>
      </div>
    </div>
  </main>`;
}

function renderHome(){
  const data = state.data;
  const played = FIXTURES.filter(m=>data.results[m.id]).length;
  const next = FIXTURES.find(m=>!data.results[m.id]);
  const rows = PLAYERS.map(p=>({name:p, ...totalsForPlayer(p)})).sort((a,b)=>b.pts-a.pts);
  return `
  <main>
    ${errBanner()}
    <div class="hero">
      <div class="badge">🏆 World Cup 2026</div>
      <h1>Przewiduj. Rywalizuj.<span class="gold-line">Zdobądź chwałę.</span></h1>
      <p>Wspólna pula zakładów na Mistrzostwa Świata 2026. 9 graczy, każdy mecz, jeden mistrz.</p>
      <div class="hero-note" style="margin-top:18px; font-size:0.8rem; color:var(--text-dim);">Zakłady można obstawiać do godziny przed startem meczu. Zakłady specjalne do piątku 12.06.2026.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="icon">👥</div><div class="num">9</div><div class="lbl">Graczy</div></div>
      <div class="stat-card"><div class="icon">🏆</div><div class="num">${FIXTURES.length}</div><div class="lbl">Meczów</div></div>
      <div class="stat-card"><div class="icon">⏱</div><div class="num">${played}</div><div class="lbl">Rozegranych</div></div>
      <div class="stat-card"><div class="icon">🎯</div><div class="num">5</div><div class="lbl">Maks. punktów</div></div>
    </div>
    <div class="section">
      <div class="section-head">
        <h2>Następny <span class="gold">mecz</span></h2>
        <div class="section-sub">${next ? fmtDate(next.kickoff) : 'Wszystkie mecze rozegrane'}</div>
      </div>
      ${next ? renderMatchCard(next) : '<div class="card">Turniej zakończony — sprawdź tabelę wyników!</div>'}
    </div>
    <div class="section">
      <div class="section-head">
        <h2>Czoło <span class="gold">tabeli</span></h2>
      </div>
      ${renderLeaderboardTable(rows.slice(0,3))}
    </div>
  </main>`;
}

function renderMatches(){
  const data = state.data;
  const upcoming = FIXTURES.filter(m=>!data.results[m.id]);
  const finished = FIXTURES.filter(m=>data.results[m.id]);
  return `
  <main>
    ${errBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Nadchodzące <span class="gold">mecze</span></h2>
        <div class="section-sub">Zakłady blokowane godzinę przed startem</div>
      </div>
      ${upcoming.map(renderMatchCard).join('') || '<div class="card">Brak nadchodzących meczów.</div>'}
    </div>
    <div class="section">
      <div class="section-head">
        <h2>Zakończone <span class="gold">mecze</span></h2>
      </div>
      ${finished.map(renderMatchCard).join('') || '<div class="card">Żaden mecz jeszcze się nie zakończył.</div>'}
    </div>
  </main>`;
}

function renderMatchCard(m){
  const data = state.data;
  const locked = isLocked(m.kickoff);
  const me = state.user.isAdmin ? null : state.user.name;
  const myBet = me ? data.bets[me+"|"+m.id] : null;
  const result = data.results[m.id];

  let rightSide = '';
  if(state.user.isAdmin){
    rightSide = `
      <div class="admin-result-edit">
        <input type="number" min="0" max="20" class="score-box" id="res-home-${m.id}" value="${result?result.home:''}" placeholder="-">
        <span class="dash">:</span>
        <input type="number" min="0" max="20" class="score-box" id="res-away-${m.id}" value="${result?result.away:''}" placeholder="-">
        <button class="save-bet" data-save-result="${m.id}">Zapisz wynik</button>
      </div>`;
  } else if(result){
    rightSide = `
      <div class="result-tag">${result.home} : ${result.away}</div>
      ${myBet ? renderPointsTag(calcPoints(myBet, result)) : '<span class="lock-tag">Brak zakładu</span>'}
    `;
  } else if(locked){
    rightSide = `
      <div class="score-input-group">
        <input type="number" class="score-box" disabled value="${myBet?myBet.home:'-'}">
        <span class="dash">:</span>
        <input type="number" class="score-box" disabled value="${myBet?myBet.away:'-'}">
      </div>
      <span class="lock-tag">🔒 Zablokowane</span>`;
  } else {
    rightSide = `
      <div class="score-input-group">
        <input type="number" min="0" max="20" class="score-box" id="bet-home-${m.id}" value="${myBet?myBet.home:''}" placeholder="-">
        <span class="dash">:</span>
        <input type="number" min="0" max="20" class="score-box" id="bet-away-${m.id}" value="${myBet?myBet.away:''}" placeholder="-">
      </div>
      <button class="save-bet" data-save-bet="${m.id}">Zapisz zakład</button>`;
  }

  return `
  <div class="match-card">
    <div class="match-meta"><span class="group">${m.group}</span><br>${fmtDate(m.kickoff)}</div>
    <div class="match-teams">${m.home} <span class="vs">vs</span> ${m.away}</div>
    ${rightSide}
  </div>`;
}

function renderPointsTag(pts){
  if(pts===3) return '<span class="points-tag points-3">+3 dokładny wynik!</span>';
  if(pts===1) return '<span class="points-tag points-1">+1 trafiony wynik meczu</span>';
  if(pts===0) return '<span class="points-tag points-0">+0</span>';
  return '';
}

function renderLeaderboardTable(rows){
  return `
  <table class="leader-table">
    <thead><tr><th>#</th><th>Gracz</th><th>Pkt</th><th>Wygrane</th><th>Przegrane</th></tr></thead>
    <tbody>
      ${rows.map((r,i)=>`
        <tr>
          <td class="rank-cell">${i+1}</td>
          <td>${r.name}</td>
          <td class="pts-cell">${r.pts}</td>
          <td>${r.won}</td>
          <td>${r.lost}</td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderLeaderboard(){
  const rows = PLAYERS.map(p=>({name:p, ...totalsForPlayer(p)})).sort((a,b)=>b.pts-a.pts);
  const max = Math.max(1, ...rows.map(r=>r.pts));
  return `
  <main>
    ${errBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Tabela <span class="gold">na żywo</span></h2>
        <div class="section-sub">Aktualizowana automatycznie po wpisaniu wyników</div>
      </div>
      ${renderLeaderboardTable(rows)}
    </div>
    <div class="section">
      <div class="section-head">
        <h2>Wykres <span class="gold">punktów</span></h2>
        <div class="section-sub">Suma punktów dla każdego gracza</div>
      </div>
      <div class="chart-card">
        ${rows.map(r=>{
          const pct = Math.round((r.pts/max)*100);
          return `
          <div class="bar-row">
            <div class="bar-name">${r.name}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;"><span>${r.pts} pkt</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </main>`;
}

function renderSpecial(){
  const data = state.data;
  const locked = specialDeadlinePassed();
  const me = state.user.isAdmin ? null : state.user.name;
  const myPick = me ? (data.specialPicks[me] || {}) : {};

  const scorerCard = `
    <div class="special-card">
      <h3>👑 Król strzelców</h3>
      <div class="deadline">Blokada w piątek 12.06.2026 · +5 pkt za trafienie</div>
      ${data.specialResult.topScorer ? `<div class="all-picks"><div class="pick-row"><span>Ustawiony zwycięzca:</span><span class="winner-set">${data.specialResult.topScorer}</span></div></div>` : ''}
      ${!state.user.isAdmin ? `
        ${locked ? `<div class="special-locked">🔒 Typy zablokowane</div>
          <div class="all-picks"><div class="pick-row"><span>Twój typ:</span><span><b>${myPick.topScorer || '— brak —'}</b></span></div></div>` : `
          <label>Twój typ na króla strzelców</label>
          <input type="text" id="pick-scorer" placeholder="Imię i nazwisko zawodnika" value="${myPick.topScorer || ''}">
          <button class="save-bet" data-save-special="topScorer" style="width:100%; margin-top:6px;">Zapisz typ</button>
        `}
      ` : `
        <div class="all-picks">
          ${PLAYERS.map(p=>`<div class="pick-row"><span>${p}</span><span>${data.specialPicks[p]?.topScorer || '—'}</span></div>`).join('')}
        </div>
      `}
    </div>`;

  const championCard = `
    <div class="special-card">
      <h3>🏆 Zwycięzca turnieju</h3>
      <div class="deadline">Blokada w piątek 12.06.2026 · +5 pkt za trafienie</div>
      ${data.specialResult.championTeam ? `<div class="all-picks"><div class="pick-row"><span>Ustawiony zwycięzca:</span><span class="winner-set">${data.specialResult.championTeam}</span></div></div>` : ''}
      ${!state.user.isAdmin ? `
        ${locked ? `<div class="special-locked">🔒 Typy zablokowane</div>
          <div class="all-picks"><div class="pick-row"><span>Twój typ:</span><span><b>${myPick.championTeam || '— brak —'}</b></span></div></div>` : `
          <label>Twój typ na zwycięzcę mundialu</label>
          <input type="text" id="pick-champion" placeholder="Nazwa reprezentacji" value="${myPick.championTeam || ''}">
          <button class="save-bet" data-save-special="championTeam" style="width:100%; margin-top:6px;">Zapisz typ</button>
        `}
      ` : `
        <div class="all-picks">
          ${PLAYERS.map(p=>`<div class="pick-row"><span>${p}</span><span>${data.specialPicks[p]?.championTeam || '—'}</span></div>`).join('')}
        </div>
      `}
    </div>`;

  return `
  <main>
    ${errBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Zakłady <span class="gold">specjalne</span></h2>
        <div class="section-sub">${locked ? 'Zablokowane' : 'Otwarte do piątku 12.06.2026, 23:59'}</div>
      </div>
      <div class="special-grid">
        ${scorerCard}
        ${championCard}
      </div>
    </div>
  </main>`;
}

function renderAdmin(){
  const data = state.data;
  return `
  <main>
    ${errBanner()}
    <div class="section" style="margin-top:40px;">
      <div class="section-head">
        <h2>Panel <span class="gold">admina</span></h2>
        <div class="section-sub">Wpisuj wyniki i ustal zwycięzców zakładów specjalnych — tryb obserwatora, bez obstawiania</div>
      </div>
      <div class="admin-grid">
        <div class="card">
          <h2>Król strzelców — ostateczna odpowiedź</h2>
          <div class="sub">Wpisz rzeczywistego króla strzelców po zakończeniu turnieju</div>
          <input type="text" id="admin-scorer" placeholder="Imię i nazwisko zawodnika" value="${data.specialResult.topScorer || ''}">
          <button class="save-bet" id="set-scorer" style="width:100%;">Ustaw króla strzelców</button>
        </div>
        <div class="card">
          <h2>Zwycięzca turnieju — ostateczna odpowiedź</h2>
          <div class="sub">Wpisz rzeczywistego mistrza świata</div>
          <input type="text" id="admin-champion" placeholder="Nazwa reprezentacji" value="${data.specialResult.championTeam || ''}">
          <button class="save-bet" id="set-champion" style="width:100%;">Ustaw zwycięzcę</button>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <h2>Wyniki <span class="gold">meczów</span></h2>
        <div class="section-sub">Wpisz wynik, aby automatycznie naliczyć punkty</div>
      </div>
      ${FIXTURES.map(renderMatchCard).join('')}
    </div>
  </main>`;
}

/* ============== OBSŁUGA ZDARZEŃ ============== */
function attachHandlers(){
  document.querySelectorAll('[data-quick]').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.getElementById('login-name').value = b.dataset.quick;
      document.getElementById('login-pass').value = '';
      document.getElementById('login-pass').focus();
    });
  });

  const loginBtn = document.getElementById('login-btn');
  if(loginBtn) loginBtn.addEventListener('click', async ()=>{
    const name = document.getElementById('login-name').value;
    const pass = document.getElementById('login-pass').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';
    if(!pass){
      err.textContent = 'Wpisz hasło.';
      err.style.display = 'block';
      return;
    }
    const creds = state.data.credentials || {};
    if(!creds[name]){
      const newData = {...state.data, credentials: {...state.data.credentials, [name]: pass}};
      await saveData(newData);
      state.user = { name, isAdmin: name === ADMIN };
      state.view = 'home';
      render();
    } else if(creds[name] !== pass){
      err.textContent = 'Nieprawidłowe hasło.';
      err.style.display = 'block';
    } else {
      state.user = { name, isAdmin: name === ADMIN };
      state.view = 'home';
      render();
    }
  });

  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const v = b.dataset.nav;
      if(v === 'logout'){ state.user = null; state.view='home'; render(); return; }
      state.view = v;
      render();
    });
  });

  document.querySelectorAll('[data-save-bet]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const id = b.dataset.saveBet;
      const h = document.getElementById('bet-home-'+id).value;
      const a = document.getElementById('bet-away-'+id).value;
      if(h==='' || a==='') return;
      const newData = {...state.data, bets: {...state.data.bets, [state.user.name+"|"+id]: {home:parseInt(h), away:parseInt(a)}}};
      await saveData(newData);
    });
  });

  document.querySelectorAll('[data-save-result]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const id = b.dataset.saveResult;
      const h = document.getElementById('res-home-'+id).value;
      const a = document.getElementById('res-away-'+id).value;
      if(h==='' || a==='') return;
      const newData = {...state.data, results: {...state.data.results, [id]: {home:parseInt(h), away:parseInt(a)}}};
      await saveData(newData);
    });
  });

  document.querySelectorAll('[data-save-special]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const key = b.dataset.saveSpecial;
      const val = key==='topScorer' ? document.getElementById('pick-scorer').value.trim() : document.getElementById('pick-champion').value.trim();
      if(!val) return;
      const newData = {...state.data, specialPicks: {...state.data.specialPicks, [state.user.name]: {...(state.data.specialPicks[state.user.name]||{}), [key]: val}}};
      await saveData(newData);
    });
  });

  const setScorer = document.getElementById('set-scorer');
  if(setScorer) setScorer.addEventListener('click', async ()=>{
    const val = document.getElementById('admin-scorer').value.trim();
    const newData = {...state.data, specialResult: {...state.data.specialResult, topScorer: val || null}};
    await saveData(newData);
  });
  const setChampion = document.getElementById('set-champion');
  if(setChampion) setChampion.addEventListener('click', async ()=>{
    const val = document.getElementById('admin-champion').value.trim();
    const newData = {...state.data, specialResult: {...state.data.specialResult, championTeam: val || null}};
    await saveData(newData);
  });
}

/* ============== INICJALIZACJA + AKTUALIZACJE NA ŻYWO ============== */
loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
